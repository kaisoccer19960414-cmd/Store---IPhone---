<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都道府県データ分析</title>
    <link rel="stylesheet" href="components/style.css">
</head>
<body>

    <h2>E-STAT活用 CSVデータ分析/集計編</h2>

    <div style="text-align: right; margin-bottom: 15px;">
        <a href="../index.html" class="nav-back">← トップへ戻る</a>
    </div>

    <div class="section">
        <h3>都道府県一覧</h3>
        <div class="search-bar">
            <input type="text" id="pref-search-input" placeholder="都道府県名で検索" autocomplete="off">
            <button id="pref-search-btn">検索</button>
            <button id="pref-search-clear-btn">クリア</button>
        </div>
        <div id="pref-controls" class="hidden">
            <div class="search-bar">
                <select id="pref-indicator-select"></select>
                <select id="pref-year-select"></select>
            </div>
        </div>
        <div id="pref-results" class="hidden">
            <div id="pref-summary" class="pref-summary hidden"></div>
            <table id="pref-table">
                <thead>
                    <tr>
                        <th data-sort="name">都道府県名</th>
                        <th data-sort="region_block">地方</th>
                        <th data-sort="indicator">指標</th>
                        <th data-sort="value">値</th>
                        <th data-sort="year">年度</th>
                    </tr>
                </thead>
                <tbody id="pref-table-body"></tbody>
            </table>
            <div id="pref-status"></div>
            <div id="pref-note" class="pref-note"></div>
        </div>
    </div>

    <script type="module" src="components/js/main.js"></script>
</body>
</html>
