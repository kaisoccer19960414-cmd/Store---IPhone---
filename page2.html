<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授業で習ったもの一覧（カレンダー検索版）</title>
    <link rel="stylesheet" href="page2_components/page2_style.css">
</head>
<body>

    <div style="text-align: left;">
        <a href="index.html" class="nav-link">➔ （1ページ目）へ戻る</a>
    </div>

    <h2>授業メモ 2ページ目</h2>

    <div class="section">
        <h3>1. クラウドDBへ保存</h3>
        <div class="input-row">
            <label for="lesson-date">授業日：</label>
            <input type="date" id="lesson-date">
        </div>
        <textarea id="input-content" placeholder="授業で習ったものを入力してください"></textarea>
        <div>
            <button onclick="saveToDB()">保存する</button>
        </div>
    </div>
//------------------------6/30
    <div class="section">
        <h3>2. 授業で習ったもの 日付別一覧</h3>
        
        <div class="input-row" style="background: #eef2f7; padding: 10px; border-radius: 6px;">
            <label for="search-date" style="font-weight: bold;">表示する日付：</label>
            <input type="date" id="search-date" onchange="fetchLessonNotesByDate()">
        </div>
        
        <div class="big-screen">
            <div class="flex-container">
                
                <div class="memo-left">
                    <h4 id="display-date-title">日付を選択してください</h4>
                    <ul id="lesson-list">
                        <li class="status-msg">上のカレンダーから日付を選ぶと、ここにメモが表示されます。</li>
                    </ul>
                </div>
                
                <div class="summary-right">
                    <h4>Gemini 要約</h4>
                    <button onclick="generateSummaryNow()" style="padding: 4px 8px; font-size: 12px;">要約を生成する</button>
                    <div id="summary-content" class="summary-box">
                        <p class="status-msg">授業メモが読み込まれると、ここに要約が表示されます。</p>
                    </div>
                </div>

            </div>
            </div>
    </div>

   

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/page2_script.js"></script>
</body>
</html>
