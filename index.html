<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超簡易クラウド入出力テスト（拡張版）</title>
    <link rel="stylesheet" href="page1_components/style.css">
</head>
<body>

    <h2>クラウド実験サイト</h2>
    <h2>１ページ目 CRUD編</h2>

    <div style="text-align: right; margin-bottom: 15px;">
        <a href="page2_front/page2.html" class="nav-to-page2">授業メモへ（※個人用です。） ➔</a>
        <a href="jp_analyzer/index.html" class="nav-to-page2">都道府県データ分析へ ➔</a>
    </div>

    <div class="section">
        <h3>1. クラウドDBへ保存</h3>
        <textarea id="input-text" placeholder="ここに文字を入力"
        autocomplete="off" autocorrect="off" spellcheck="false" rows="4"></textarea>


        <select id="author-select"></select>
        <button id="save-btn">保存する</button>
    </div>

    <div class="section">
        <h3>2. DBから最新の1件をとり出す</h3>
        <button id="read-btn">最新1件取得</button>
        <div id="output-area">ここにDBから取得した文字が出力されます。</div>
    </div>

    <div class="section">
        <h3>3. DBの中身を一覧表示（最新20件）</h3>
        <button id="fetch-all-btn">データを読み込む</button>
        <table id="data-table" style="display: none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>DBに入力されたテキスト</th>
                    <th>投稿者</th>
                    <th>投稿日時</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <button id="load-more-btn" style="display:none;">もっと見る</button>
        <div id="list-status"></div>
    </div>

    <script type="module" src="page1_components/js/main.js"></script>
</body>
</html>
