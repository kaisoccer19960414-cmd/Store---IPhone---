<script type="text/babel">
  // 🔑 Supabaseの設定
  const SUPABASE_URL = 'https://tekrwutayfleorpfbuhc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRla3J3dXRheWZsZW9ycGZidWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTg3OTk3MzMsImV4cCI6MjAzNDM3NTczM30.bM_j_H8v7i99SgO3_H9gO3_H9gO3_H9gO3_H9gO3_H9g'; // ※画像から見えているキーを使用
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function ChatApp() {
    // 📦 ステート（状態）管理
    const [messages, setMessages] = React.useState([]); // 最初は空配列にしてDBから取得する
    const [inputText, setInputText] = React.useState("");

    // 🌟 1. ページが開いた瞬間にSupabaseからデータを取ってくる処理（GET）
    const fetchMessages = async () => {
      const { data, error } = await supabaseClient
        .from('messages')
        .select('*')
        .order('created_at', { ascending: true }); // 時系列順に並べる

      if (error) {
        console.error('データ取得失敗:', error);
      } else {
        setMessages(data); // 画面のメッセージ一覧を更新
      }
    };

    React.useEffect(() => {
      fetchMessages(); // 初回読み込み

      // ⚡️ 【超重要】オカンが送信した瞬間に画面をリアルタイム更新する魔法（リアルタイムリスナー）
      const channel = supabaseClient
        .channel('schema-db-changes')
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'messages' },
          (payload) => {
            // 新しいメッセージがDBに入ったら、手元のステートに合体させる
            setMessages((prev) => [...prev, payload.new]);
          }
        )
        .subscribe();

      return () => {
        supabaseClient.removeChannel(channel); // 画面を閉じたらリスナーを解除
      };
    }, []);

    // ✉️ 2. 送信ボタンを押したときの処理（POST）
    const handleSend = async () => {
      if (!inputText.trim()) return; // 空文字なら無視

      // Supabaseの「messages」テーブルにデータを突っ込む！
      const { error } = await supabaseClient
        .from('messages')
        .insert([
          {
            sender_name: 'ワイ',      // ※オカン側のスマホならここを「ママ」に変える
            message_text: inputText
          }
        ]);

      if (error) {
        alert('送信に失敗しました…');
        console.error(error);
      } else {
        setInputText(""); // 送信が成功したら入力欄を空っぽにする
      }
    };

    return (
      <div className="chat-container">
        {/* ヘッダー */}
        <div className="chat-header">チャット（リアルタイム版）</div>

        {/* メッセージ表示エリア */}
        <div className="message-area">
          {messages.map((msg) => (
            <div key={msg.id} className={`message-row ${msg.sender_name === 'ワイ' ? 'right' : 'left'}`}>
              <div className="user-name">{msg.sender_name}</div>
              <div className="bubble">{msg.message_text}</div>
            </div>
          ))}
        </div>

        {/* 入力フォームエリア */}
        <div className="input-area">
          <input 
            type="text" 
            className="input-box" 
            value={inputText}
            onChange={(e) => setInputText(e.target.value)}
            placeholder="メッセージを入力"
          />
          <button className="send-btn" onClick={handleSend}>送信</button>
        </div>
      </div>
    );
  }

  // HTMLの <div id="root"></div> にReactをレンダリング
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ChatApp />);
</script>
